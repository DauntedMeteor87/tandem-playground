<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;height:100%}
  .tile{width:1280px;height:854px;display:flex;font-family:var(--font-display)}
  .main{flex:1;background:var(--surface-dark);display:flex;align-items:center;justify-content:center;padding:0 90px}
  .main span{color:var(--text-on-dark);font-weight:500;font-size:150px;letter-spacing:-.03em;line-height:.95;text-align:center}
  .strip{width:300px;display:flex;flex-direction:column}
  .strip div{flex:1}
</style></head>
<body>
  <div class="tile">
    <div class="main"><span>tandem<br>club</span></div>
    <div class="strip">
      <div style="background:#ef9459"></div>
      <div style="background:#e0703a"></div>
      <div style="background:#f4657a"></div>
      <div style="background:#09a1a1"></div>
      <div style="background:#6f5f96"></div>
    </div>
  </div>
</body></html>
