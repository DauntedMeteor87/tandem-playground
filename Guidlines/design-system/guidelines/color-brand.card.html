<!-- @dsCard group="Colors" viewport="700x150" name="Golden Hour — brand hues" subtitle="Default palette: sunset coral action, dusk violet accent" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-dark);font-family:var(--font-ui);padding:18px;display:flex;gap:12px;flex-wrap:wrap}
  .sw{width:104px}
  .chip{height:56px;border-radius:12px;box-shadow:var(--shadow-card)}
  .n{font-size:12px;font-weight:700;color:var(--text-on-dark);margin-top:7px}
  .h{font-size:11px;color:var(--text-on-dark-dim);font-family:var(--font-mono)}
</style></head><body>
  <div class="sw"><div class="chip" style="background:var(--sun-500)"></div><div class="n">Sunset coral</div><div class="h">--action</div></div>
  <div class="sw"><div class="chip" style="background:var(--sun-600)"></div><div class="n">Ember</div><div class="h">--sun-600</div></div>
  <div class="sw"><div class="chip" style="background:var(--sun-400)"></div><div class="n">Amber</div><div class="h">--sun-400</div></div>
  <div class="sw"><div class="chip" style="background:var(--sun-200)"></div><div class="n">Peach wash</div><div class="h">--action-soft</div></div>
  <div class="sw"><div class="chip" style="background:var(--dusk-500)"></div><div class="n">Dusk violet</div><div class="h">--accent</div></div>
  <div class="sw"><div class="chip" style="background:var(--meadow-500)"></div><div class="n">Meadow</div><div class="h">--success</div></div>
  <div class="sw"><div class="chip" style="background:var(--sky-500)"></div><div class="n">Sky</div><div class="h">--info</div></div>
</body></html>
