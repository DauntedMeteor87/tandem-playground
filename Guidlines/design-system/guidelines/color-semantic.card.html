<!-- @dsCard group="Colors" viewport="700x170" name="Semantic roles" subtitle="What components actually reference" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-dark);font-family:var(--font-ui);padding:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .c{border-radius:10px;padding:12px;border:1px solid var(--border);font-size:11px;font-weight:700;font-family:var(--font-mono)}
</style></head><body>
  <div class="c" style="background:var(--surface-card);color:var(--text-primary)">--surface-card</div>
  <div class="c" style="background:var(--surface-app);color:var(--text-primary)">--surface-app</div>
  <div class="c" style="background:var(--surface-raised);color:var(--text-primary)">--surface-raised</div>
  <div class="c" style="background:var(--surface-card);color:var(--text-secondary)">--text-secondary</div>
  <div class="c" style="background:var(--action);color:var(--text-on-action)">--action</div>
  <div class="c" style="background:var(--accent);color:#fff">--accent</div>
  <div class="c" style="background:var(--success);color:#fff">--success</div>
  <div class="c" style="background:var(--danger);color:#fff">--danger</div>
</body></html>
