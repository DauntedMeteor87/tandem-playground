<!-- @dsCard group="Type" viewport="700x200" name="UI — Hanken Grotesk" subtitle="Friendly humanist sans, legible at small sizes" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-dark);padding:20px 22px;color:var(--text-on-dark);font-family:var(--font-ui)}
  .r{display:flex;align-items:baseline;gap:14px;margin-bottom:9px}
  .r span:first-child{width:96px;font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono)}
  .t{font-weight:800;font-size:22px;letter-spacing:-.02em}
  .h{font-weight:800;font-size:19px}
  .b{font-weight:400;font-size:15px}
  .l{font-weight:700;font-size:13.5px;color:var(--text-secondary)}
  .me{font-weight:600;font-size:12.5px;color:var(--text-tertiary)}
</style></head><body>
  <div class="r"><span>Title / 800</span><span class="t">Sign ups for you</span></div>
  <div class="r"><span>Heading / 800</span><span class="h">Bishop Peak Sunset Hike</span></div>
  <div class="r"><span>Body / 400</span><span class="b">Chill after-class hike. We go slow and grab tacos after.</span></div>
  <div class="r"><span>Label / 700</span><span class="l">TRIP LEAD</span></div>
  <div class="r"><span>Meta / 600</span><span class="me">Field Studies · 6 spots left</span></div>
</body></html>
